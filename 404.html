<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404</title>
    <link rel="stylesheet" href="/stylesheets/style.css">
    <link rel="stylesheet" href="/stylesheets/404.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Radio+Canada:ital,wght@0,300..700&family=Yusei+Magic&display=swap"
        rel="stylesheet">
</head>

<body>
    <include src="/components/header.html"></include>

    <div class="container">
        <section class="section main">
            <div class="text">
                <h1>404</h1>
                <p id="hahaha">'<span id="page"></span>' was not found. so either it was removed or you're STUPID and
                    typed it in
                    wrong HAHAHAH</p>
            </div>
        </section>
    </div>

    <include src="/components/buttons.html"></include>

    <script src="/js/lib/include.js"></script>
    <script src="/js/tooltip.js"></script>
    <script src="/js/misc.js"></script>

    <script>
        const pageSpan = document.getElementById("page");
        const message = document.getElementById("hahaha");
        const path = window.location.pathname;

        const normalized = path.replace(/\/$/, "");

        const is404Page =
            normalized === "/404" ||
            normalized === "/404.html";

        if (is404Page) {
            pageSpan.textContent = "404 page (why are you here)";
            message.textContent =
                "What the fuck are you doing, why would you go to the 404 page???";
        } else {
            pageSpan.textContent = path.startsWith("/") ? path.slice(1) : path;
        }
    </script>
</body>

</html>
