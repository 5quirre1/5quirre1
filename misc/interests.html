<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>interests</title>
    <link rel="stylesheet" href="/stylesheets/style.css">
    <link rel="stylesheet" href="/stylesheets/misc/interests/interests.css">
    <link rel="stylesheet" href="/stylesheets/about/about.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Radio+Canada:ital,wght@0,300..700&family=Yusei+Magic&display=swap"
        rel="stylesheet">
</head>

<body>
    <include src="/components/header.html"></include>

    <div class="container">
        <section class="section main">
            <div class="text">
                <include src="components/interests/text.html"></include>
            </div>

            <div class="side interests-side">
                <div class="interests-photo-albums">
                    <div class="interests-photo-wrap">
                        <a href="gallery"><img id="random-photo" data-tip="go see more in the gallery!!!" src=""
                                alt="some random photo i took"></a>
                        <small class="interests-photo-caption">random photos i took</small>
                    </div>
                    <div class="interests-albums-wrap">
                        <div class="amazing-albums">
                            <div class="amazing-albums-content"></div>
                        </div>
                        <small class="interests-albums-caption">some albums i like<br>find some more at <a href="albums">albums</a>..</small>
                    </div>
                </div>

                <div class="movies-popup">
                    <div class="movies-popup-inner">
                        <div class="movies-popup-viewport">
                            <div class="movies-popup-track"></div>
                        </div>
                        <small class="movies-popup-caption">my favorite movies</small>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <include src="/components/footer.html"></include>

    <script src="https://sc.squirrelz.xyz/track.js?key=squirrel"></script>

    <script src="/js/rolling-text.js"></script>
    <script src="/js/lib/include.js"></script>
    <script src="/js/tooltip.js"></script>
    <script src="/js/misc.js"></script>
    <script src="/js/maybemarquee.js"></script>
    <script src="/js/misc/interests/albums.js"></script>
    <script src="/js/misc/interests/rand-photo.js"></script>
    <script src="/js/misc/interests/movies.js"></script>

</body>

</html>
