<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>goals</title>
    <link rel="stylesheet" href="/stylesheets/style.css">
    <link rel="stylesheet" href="/stylesheets/misc/goals/goals.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Radio+Canada:ital,wght@0,300..700&family=Yusei+Magic&display=swap"
        rel="stylesheet">
</head>

<body>
    <include src="/components/header.html"></include>

    <div class="container">
        <section class="section main">
            <div class="goals-wrap">
                <div class="goals-cards" id="goals-cards"></div>

                <div class="goals-bar-section">
                    <div class="goals-bar-meta">
                        <span>saved - <strong id="money-display">$0.00</strong></span>
                        <span id="progress-label">0%</span>
                    </div>
                    <div class="goals-bar-outer">
                        <div class="goals-bar-track">
                            <div class="goals-bar-fill" id="bar-fill"></div>
                        </div>
                        <div class="goals-waypoints" id="waypoints"></div>
                    </div>
                </div>

                <div class="goals-stats" id="goals-stats"></div>

            </div>
        </section>
    </div>

    <include src="/components/footer.html"></include>

    <script src="https://sc.squirrelz.xyz/track.js?key=squirrel"></script>
        
    <script src="/js/rolling-text.js"></script>
    <script src="/js/lib/include.js"></script>
    <script src="/js/maybemarquee.js"></script>
    <script src="/js/tooltip.js"></script>
    <script src="/js/misc.js"></script>
    <script src="/js/misc/goals/goals.js"></script>
</body>

</html>
